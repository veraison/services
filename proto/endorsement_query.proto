syntax = "proto3";

package proto;

import "status.proto";

option go_package = "github.com/veraison/services/proto";

message EndorsementQueryIn {
  // base64url-encoded CoSERV
  string query = 3;
  // media type to be used for the result set
  string result_set_media_type = 2;
}

message EndorsementQueryOut {
  Status status = 1;
  bytes result_set = 2;
}
